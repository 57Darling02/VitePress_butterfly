# posts/site_config.yml将优先被使用; 
# posts/public 资源、网络资源允许被调用,

# Site Information
site_name: "My Awesome Site"
site_description: "这是一个使用 VitePress 构建的博客站点。"
site_url: "/"
author: "57Darling02"

# Visual Experience
isDark: null                   # 默认主题色：null(跟随系统) | true(深色) | false(浅色)
background: "#FDF8F2"          # 背景 可以为16进制色号或图片资源
bg_rainfall: false              # 启用背景飞雪特效

# Home Page Configuration
home:
  mainTitle: "My Custom Site"
  subTitles:
    - "世界上只有一种英雄主义"
    - "那就是在认清生活的真相后"
    - "依然热爱生活"
  firstViewHeight: 60          # 首屏高度百分比，建议 60-100

# Post List Configuration
pageSize: 8                    # 每页显示文章数量
sortedMethor: "date"           # 排序方式: "date" | "lastUpdated"

lastUpdated:
  use: true
  text: ""

# Profile Card
avatar: "/image/image.png"     # 调用 posts/public/image/image.png
name: "57Darling02"
position: "NPC"                # 角色标签
bio: "红红火火恍恍惚惚"          # 个人简介
socialLinks:
  - name: "GitHub"
    icon: "fa-brands fa-github"
    url: "https://github.com/57Darling02/"

# Navbar Configuration
menuItems:
  - label: "更多"
    icon: "fa-solid fa-compass"
    children:
      - key: "friends"
        label: "友链"
        icon: "fa-solid fa-user-group"
        link: "/FriendLink/"
      - key: "tags"
        label: "标签"
        icon: "fa-solid fa-tags"
        link: "/Tags/"
      

# 导航栏音乐播放器
musicPlayer:
  enabled: false              
  url: "https://music.163.com/song/media/outer/url?id=3372997533.mp3"
  name: "lofi bbox"
  artist: "Shi Nian Yi Shi"
  cover: "https://p2.music.126.net/5GL5jxLP9LCi6HpqXwKJfQ==/109951173099535524.jpg"
  autoplay: true
  volume: 0.6                 # 0 ~ 1

# Friend Links
friendlink:
  - Name: "57Darling02的的博客"
    Url: "https://57darling02.github.io"
    Avatar: "http://q1.qlogo.cn/g?b=qq&nk=3144223912&s=100"
    Desc: "这是一个示例博客描述"
  - Name: "anaouse的博客"
    Url: "https://anaouse.cv"
    Avatar: "http://q1.qlogo.cn/g?b=qq&nk=3482556417&s=100"
    Desc: "这是一个示例博客描述"

# Footer Configuration
footer:
  message: "Hello World!"
  copyright: "Power by VitePress_butterfly"
  createdTime: "2025-01-01"

# Comments (Giscus)
comments:
  enabled: false
  # Paste the whole script generated by https://giscus.app/zh-CN
  script: |
    <script src="https://giscus.app/client.js"
            data-repo="57Darling02/VitePress_butterfly"
            data-repo-id=""
            data-category=""
            data-category-id=""
            data-mapping="pathname"
            data-strict="0"
            data-reactions-enabled="1"
            data-emit-metadata="0"
            data-input-position="top"
            data-theme="preferred_color_scheme"
            data-lang="zh-CN"
            data-loading="lazy"
            crossorigin="anonymous"
            async>
    </script>
