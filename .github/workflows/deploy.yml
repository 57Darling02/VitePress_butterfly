name: Deploy Site

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [contents-updated]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: site-deploy
  cancel-in-progress: false

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build with VitePress
        env:
          WIKI_URL: ${{ secrets.WIKI_URL }}
          WIKI_BRANCH: ${{ secrets.WIKI_BRANCH }}
          PAT: ${{ secrets.PAT }}
        run: pnpm docs:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist

      - name: Upload reusable site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: .vitepress/dist
          retention-days: 7

  deploy-pages:
    name: Deploy GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-vercel:
    name: Deploy Vercel (optional)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check Vercel config
        id: vercel-check
        run: |
          if [ -n "${{ secrets.VERCEL_TOKEN }}" ] && [ -n "${{ secrets.VERCEL_ORG_ID }}" ] && [ -n "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip Vercel deploy (missing config)
        if: steps.vercel-check.outputs.enabled != 'true'
        run: echo "Skip Vercel deploy because VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID is not fully configured."

      - name: Download built site artifact
        if: steps.vercel-check.outputs.enabled == 'true'
        uses: actions/download-artifact@v4
        with:
          name: site-dist
          path: .site-dist

      - name: Setup Node
        if: steps.vercel-check.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        if: steps.vercel-check.outputs.enabled == 'true'
        run: npm install -g vercel@latest

      - name: Deploy static build to Vercel
        if: steps.vercel-check.outputs.enabled == 'true'
        run: |
          TARGET_DIR=".site-dist"
          if [ -d ".site-dist/dist" ]; then
            TARGET_DIR=".site-dist/dist"
          fi
          vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }} "$TARGET_DIR"
