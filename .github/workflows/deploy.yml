name: Deploy VitePress site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [blog-post-updated]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch Posts (optional)
        env:
          POST_REPO: ${{ secrets['POST_REPO'] }}
          POST_BRANCH: ${{ secrets['POST_BRANCH'] }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets['PERSONAL_ACCESS_TOKEN'] }}
        run: pnpm fetch-posts
        continue-on-error: true

      - name: Build with VitePress
        run: pnpm docs:build

      - name: Package site bundle
        run: |
          tar -czf vitepress-dist.tar.gz -C .vitepress dist

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist

      - name: Upload run artifact (downloadable)
        uses: actions/upload-artifact@v4
        with:
          name: vitepress-dist-${{ github.run_number }}
          path: vitepress-dist.tar.gz
          retention-days: 14

      - name: Publish bundle to Release (latest)
        uses: softprops/action-gh-release@v2
        if: github.event_name != 'pull_request'
        continue-on-error: true
        with:
          tag_name: site-build-latest
          name: Site Build Latest
          body: Automated bundle from commit ${{ github.sha }}
          files: vitepress-dist.tar.gz

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4