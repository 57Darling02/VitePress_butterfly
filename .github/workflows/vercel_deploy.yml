name: Vercel Production Deployment

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

on:
  push:
    branches:
      - main
  workflow_dispatch:
  repository_dispatch:
    types: [blog-post-updated]

jobs:
  Deploy-Production:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch Posts (optional)
        env:
          POST_REPO: ${{ secrets['POST_REPO'] }}
          POST_BRANCH: ${{ secrets['POST_BRANCH'] }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets['PERSONAL_ACCESS_TOKEN'] }}
        run: pnpm fetch-posts
        continue-on-error: true

      - name: Check Vercel deployment config
        id: check-vercel-config
        run: |
          missing=false

          if [ -z "${{ secrets['VERCEL_TOKEN'] }}" ]; then
            echo "VERCEL_TOKEN is missing."
            missing=true
          fi

          if [ -z "${{ secrets['VERCEL_ORG_ID'] }}" ]; then
            echo "VERCEL_ORG_ID is missing."
            missing=true
          fi

          if [ -z "${{ secrets['VERCEL_PROJECT_ID'] }}" ]; then
            echo "VERCEL_PROJECT_ID is missing."
            missing=true
          fi

          if [ "$missing" = true ]; then
            echo "has_vercel_config=false" >> $GITHUB_OUTPUT
          else
            echo "has_vercel_config=true" >> $GITHUB_OUTPUT
          fi

      - name: Skip Vercel deploy (missing config)
        if: steps.check-vercel-config.outputs.has_vercel_config != 'true'
        run: echo "Skip deploy because Vercel secrets are not fully configured."

      - name: Install Vercel CLI
        if: steps.check-vercel-config.outputs.has_vercel_config == 'true'
        run: pnpm add -g vercel@latest

      - name: Pull Vercel Environment Information
        if: steps.check-vercel-config.outputs.has_vercel_config == 'true'
        run: vercel pull --yes --environment=production --token=${{ secrets['VERCEL_TOKEN'] }}

      - name: Build Project Artifacts
        if: steps.check-vercel-config.outputs.has_vercel_config == 'true'
        run: vercel build --prod --token=${{ secrets['VERCEL_TOKEN'] }}

      - name: Deploy Project Artifacts to Vercel
        if: steps.check-vercel-config.outputs.has_vercel_config == 'true'
        run: vercel deploy --prebuilt --prod --token=${{ secrets['VERCEL_TOKEN'] }}